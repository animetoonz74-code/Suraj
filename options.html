<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Options - Social Media Tools</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #4a5568;
      margin-bottom: 30px;
      font-size: 2em;
      font-weight: 300;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      margin: 15px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      color: white;
    }

    .btn-primary {
      background: linear-gradient(45deg, #ff6b6b, #ee5a24);
      box-shadow: 0 8px 25px rgba(255, 107, 107, 0.4);
    }

    .btn-secondary {
      background: linear-gradient(45deg, #4834d4, #686de0);
      box-shadow: 0 8px 25px rgba(104, 109, 224, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .subtitle {
      color: #718096;
      margin-bottom: 20px;
      font-size: 1.1em;
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        margin: 10px;
      }
      
      h2 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Select Option</h2>
    <p class="subtitle">Choose the tool you need</p>
    
    <button class="btn btn-primary" onclick="go('block')">
      🛡️ Block Instagram Page
    </button>
    
    <button class="btn btn-secondary" onclick="go('viewer')">
      👁️ Private Account Story Viewer
    </button>
  </div>

  <script>
    function go(type) {
      // You can pass the option type to input.html
      const url = type ? `input.html?option=${type}` : 'input.html';
      window.location.href = url;
    }
  </script>
</body>
</html>
